<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Question a Day</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.2.0/crypto-js.min.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="card">
        <h1>A Question a Day</h1>

        <p id="subtitle" class="subtitle">Loading today's question...</p>
        <div id="error" class="error hidden"></div>
        
        <div id="welcome-view">
          <button id="view-btn" class="primary-btn" disabled>View Question</button>
        </div>

        <div id="question-view" class="hidden">
          <article id="question-text" class="question-box"></article>

          <div id="answer-form">
            <label class="input-label" for="answer">Your answer</label>
            <input
              id="answer"
              class="answer-input"
              type="text"
              placeholder="Type your answer here"
            />

            <button id="answer-btn" class="primary-btn">Answer</button>
          </div>
          <p id="attempts" class="attempts">Attempts: 0</p>

          <div id="answered-block" class="hidden answered-block">
            <p class="subtitle">Yay! You've already answered today's question</p>
            <div class="share-row">
              <button id="answered-share-btn" class="secondary-btn">Share 🚀</button>
            </div>
            <div class="trivia-box">
              <h3>Did you know?</h3>
              <p id="trivia-text"></p>
              <p id="trivia-error" class="error hidden"></p>
            </div>
          </div>
        </div>

        <div id="success-view" class="hidden">
          <h2>You got it! 🎉</h2>
          <p class="subtitle">Share it with your friends!</p>
          <div class="share-row">
            <button id="share-btn" class="secondary-btn">Share 🚀</button>
            <button id="success-home-btn" class="primary-btn">Home</button>
          </div>
        </div>
      </section>
    </main>

    <div id="popup-backdrop" class="popup-backdrop hidden">
      <div class="popup">
        <p>You're not quite there yet</p>
        <button id="try-again-btn" class="primary-btn">Try again</button>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
